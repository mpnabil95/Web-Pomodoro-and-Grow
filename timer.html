<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Fokus - Pomodoro & Grow</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- CSS Kustom Bersama -->
    <link href="styles.css" rel="stylesheet">

    <style>
        /* CSS khusus halaman timer: posisi & warna dekorasi background */
        .bg-decor-1 {
            width: 350px; height: 350px;
            background: var(--primary-playful);
            opacity: 0.1;
            top: -100px; right: -100px;
        }
        .bg-decor-2 {
            width: 250px; height: 250px;
            background: var(--secondary-playful);
            opacity: 0.1;
            bottom: -60px; left: -60px;
        }
    </style>
</head>
<body>

    <!-- Dekorasi Background -->
    <div class="bg-decor bg-decor-1"></div>
    <div class="bg-decor bg-decor-2"></div>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-playful mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌱 Pomodoro & Grow</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="index.html">Beranda</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <a class="nav-link fw-bold" href="timer.html">Mulai Fokus</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <a class="nav-link fw-bold" href="koleksi.html">Koleksi Saya</a>
                    </li>
                    <li class="nav-item no-auth">
                        <a href="login.html" class="btn btn-outline-play px-4">Masuk</a>
                    </li>
                    <li class="nav-item no-auth">
                        <a href="register.html" class="btn btn-primary-play">Daftar</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <button class="btn btn-outline-danger rounded-pill fw-bold" onclick="logout()">Keluar</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toast Notifikasi -->
    <div id="toast-container">
        <div id="app-toast" class="playful-toast">Pesan di sini</div>
    </div>

    <!-- ================= KONTEN UTAMA ================= -->
    <main class="container flex-grow-1 d-flex flex-column justify-content-center py-4 text-center" style="position: relative; z-index: 1;">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="playful-card">

                    <p id="user-greeting" class="fw-bold text-muted mb-1">Halo! 👋</p>
                    <h3 class="fw-bold mb-3">Sesi Fokus</h3>

                    <div id="level-badge" class="level-badge">Level 0</div>

                    <!-- Aset Visual Tanaman (Elemen Image Wajib) -->
                    <div id="plant-visual" class="plant-illustration my-2 animate-pop"></div>

                    <p id="level-text" class="fw-bold text-pastel-green fs-6 mb-0">Level 0: Pot Siap Ditanam!</p>

                    <div class="session-info d-flex justify-content-center gap-4 mb-2">
                        <div>
                            <div class="fw-bold fs-5" id="session-count">0</div>
                            <div class="text-muted small fw-semibold">Sesi Selesai</div>
                        </div>
                        <div class="border-end border-2"></div>
                        <div>
                            <div class="fw-bold fs-5" id="session-target">4</div>
                            <div class="text-muted small fw-semibold">Target Sesi</div>
                        </div>
                    </div>

                    <div id="timer-display" class="timer-display">25:00</div>

                    <div class="d-flex justify-content-center gap-3 mt-3 flex-wrap">
                        <button id="btn-start" class="btn btn-primary-play fs-5" onclick="startTimer()">▶ Mulai</button>
                        <button id="btn-pause" class="btn btn-secondary-play fs-5 d-none" onclick="pauseTimer()">⏸ Jeda</button>
                        <button id="btn-reset" class="btn btn-outline-play fs-5" onclick="resetTimer()">↺ Reset</button>
                    </div>

                    <div class="mt-4">
                        <a href="koleksi.html" class="text-pastel-green fw-bold text-decoration-none">
                            🌳 Lihat Koleksi Tanamanku →
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-4 text-center" style="position: relative; z-index: 1;">
        <p class="fw-bold text-muted mb-0">© 2026 Pomodoro & Grow - Final Project PPW.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* =========================================================================
           BLOK 2: PROTEKSI HALAMAN & SESI
           ========================================================================= */
        function checkAuth() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) {
                showToast('Kamu harus login terlebih dahulu!', '#F59E0B');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                return null;
            }
            return activeUser;
        }

        function updateNavbar() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (activeUser) {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.add('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.remove('d-none'));
            } else {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.remove('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.add('d-none'));
            }
        }

        function logout() {
            clearInterval(timerInterval);
            localStorage.removeItem('activeUser');
            showToast('Berhasil keluar.');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        }

        function showToast(message, color = 'var(--primary-playful)') {
            const toast = document.getElementById('app-toast');
            toast.textContent = message;
            toast.style.borderLeftColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        /* =========================================================================
           BLOK 3: MESIN TIMER & LOGIKA GAMIFIKASI TANAMAN
           ========================================================================= */
        const SESSION_DURATION = 25 * 60;
        // const SESSION_DURATION = 5; // Uncomment untuk testing cepat

        let timeLeft      = SESSION_DURATION;
        let timerInterval = null;
        let isRunning     = false;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            if (!checkAuth()) return;

            isRunning = true;
            document.getElementById('btn-start').classList.add('d-none');
            document.getElementById('btn-pause').classList.remove('d-none');
            document.getElementById('timer-display').classList.add('running');
            document.getElementById('timer-display').classList.remove('paused');

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    processSessionComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('btn-pause').classList.add('d-none');
            document.getElementById('btn-start').classList.remove('d-none');
            document.getElementById('btn-start').textContent = '▶ Lanjutkan';
            document.getElementById('timer-display').classList.remove('running');
            document.getElementById('timer-display').classList.add('paused');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft  = SESSION_DURATION;
            updateTimerDisplay();
            document.getElementById('btn-pause').classList.add('d-none');
            document.getElementById('btn-start').classList.remove('d-none');
            document.getElementById('btn-start').innerHTML = '▶ Mulai';
            document.getElementById('timer-display').classList.remove('running', 'paused');
        }

        function processSessionComplete() {
            let activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) return;

            activeUser.completedSessions += 1;

            let history = JSON.parse(localStorage.getItem(`history_${activeUser.email}`)) || [];
            history.push({ date: new Date().toLocaleString('id-ID'), duration: 25, status: 'Berhasil' });

            localStorage.setItem('activeUser', JSON.stringify(activeUser));
            localStorage.setItem(`history_${activeUser.email}`, JSON.stringify(history));

            let users = JSON.parse(localStorage.getItem('pomodoroUsers')) || [];
            let userIndex = users.findIndex(u => u.email === activeUser.email);
            if (userIndex !== -1) {
                users[userIndex].completedSessions = activeUser.completedSessions;
                localStorage.setItem('pomodoroUsers', JSON.stringify(users));
            }

            showToast('🎉 Selamat! Sesi selesai. Tanamanmu bertumbuh!');
            updatePlantVisual();
            updateSessionCount();
            resetTimer();

            const plantDiv = document.getElementById('plant-visual');
            plantDiv.classList.remove('animate-pop');
            plantDiv.classList.add('animate-bouncy');
            setTimeout(() => {
                plantDiv.classList.remove('animate-bouncy');
                plantDiv.classList.add('animate-pop');
            }, 1000);
        }

        function updatePlantVisual() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) return;

            const sessions       = activeUser.completedSessions;
            const plantContainer = document.getElementById('plant-visual');
            const levelText      = document.getElementById('level-text');
            const levelBadge     = document.getElementById('level-badge');

            let svgContent = '';

            if (sessions === 0) {
                levelText.textContent  = 'Level 0: Pot Siap Ditanam!';
                levelBadge.textContent = 'Level 0';
                levelBadge.style.background = 'linear-gradient(135deg, #9CA3AF, #6B7280)';
                svgContent = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 55 L80 55 L70 92 L30 92 Z" fill="#D97706"/>
                    <rect x="15" y="48" width="70" height="10" rx="5" fill="#B45309"/>
                    <ellipse cx="50" cy="53" rx="30" ry="8" fill="#92400E"/>
                    <path d="M25 60 L28 85" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
                </svg>`;

            } else if (sessions === 1) {
                levelText.textContent  = 'Level 1: Benih Telah Ditanam!';
                levelBadge.textContent = 'Level 1';
                levelBadge.style.background = 'linear-gradient(135deg, #FDE047, #F59E0B)';
                svgContent = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 55 L80 55 L70 92 L30 92 Z" fill="#D97706"/>
                    <rect x="15" y="48" width="70" height="10" rx="5" fill="#B45309"/>
                    <ellipse cx="50" cy="53" rx="30" ry="8" fill="#92400E"/>
                    <ellipse cx="50" cy="47" rx="6" ry="4" fill="#FDE047"/>
                    <ellipse cx="50" cy="46" rx="4" ry="3" fill="#FCD34D"/>
                    <path d="M25 60 L28 85" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
                </svg>`;

            } else if (sessions >= 2 && sessions <= 3) {
                levelText.textContent  = 'Level 2: Tunas Kecil Muncul!';
                levelBadge.textContent = 'Level 2';
                levelBadge.style.background = 'linear-gradient(135deg, #86EFAC, #4ADE80)';
                svgContent = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect x="47" y="28" width="6" height="24" rx="3" fill="#16A34A"/>
                    <ellipse cx="38" cy="32" rx="10" ry="7" fill="#4ADE80" transform="rotate(-20 38 32)"/>
                    <ellipse cx="62" cy="32" rx="10" ry="7" fill="#4ADE80" transform="rotate(20 62 32)"/>
                    <circle cx="50" cy="24" r="8" fill="#22C55E"/>
                    <path d="M20 55 L80 55 L70 92 L30 92 Z" fill="#D97706"/>
                    <rect x="15" y="48" width="70" height="10" rx="5" fill="#B45309"/>
                    <ellipse cx="50" cy="53" rx="30" ry="8" fill="#92400E"/>
                    <path d="M25 60 L28 85" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
                </svg>`;

            } else {
                levelText.textContent  = 'Level 3: Pohon Rindang nan Indah!';
                levelBadge.textContent = 'Level 3 ✨';
                levelBadge.style.background = 'linear-gradient(135deg, #34D399, #059669)';
                svgContent = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <rect x="45" y="22" width="10" height="34" rx="4" fill="#15803D"/>
                    <circle cx="32" cy="28" r="16" fill="#4ADE80"/>
                    <circle cx="68" cy="28" r="16" fill="#4ADE80"/>
                    <circle cx="50" cy="12" r="20" fill="#22C55E"/>
                    <circle cx="44" cy="8" r="8" fill="#4ADE80" opacity="0.6"/>
                    <circle cx="42" cy="18" r="4" fill="#F472B6"/>
                    <circle cx="58" cy="22" r="4" fill="#F472B6"/>
                    <circle cx="50" cy="32" r="3" fill="#FB923C"/>
                    <circle cx="36" cy="32" r="3" fill="#FDE047"/>
                    <circle cx="64" cy="34" r="3" fill="#FDE047"/>
                    <path d="M20 55 L80 55 L70 92 L30 92 Z" fill="#D97706"/>
                    <rect x="15" y="48" width="70" height="10" rx="5" fill="#B45309"/>
                    <ellipse cx="50" cy="53" rx="30" ry="8" fill="#92400E"/>
                    <path d="M25 60 L28 85" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
                </svg>`;
            }

            plantContainer.innerHTML = svgContent;
        }

        function updateSessionCount() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) return;
            document.getElementById('session-count').textContent = activeUser.completedSessions;
        }

        window.onload = () => {
            const activeUser = checkAuth();
            if (!activeUser) return;
            updateNavbar();
            document.getElementById('user-greeting').textContent = `Halo, ${activeUser.name}! 👋`;
            updatePlantVisual();
            updateSessionCount();
            updateTimerDisplay();
        };
    </script>
</body>
</html>
