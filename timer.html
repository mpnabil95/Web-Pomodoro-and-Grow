    <script>
        /* =========================================================================
           BLOK 2: PROTEKSI HALAMAN & SESI
           ========================================================================= */
        function checkAuth() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) {
                showToast('Kamu harus login terlebih dahulu!', '#F59E0B');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                return null;
            }
            return activeUser;
        }

        function updateNavbar() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (activeUser) {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.add('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.remove('d-none'));
            } else {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.remove('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.add('d-none'));
            }
        }

        function logout() {
            clearInterval(timerInterval);
            localStorage.removeItem('activeUser');
            showToast('Berhasil keluar.');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        }

        function showToast(message, color = 'var(--primary-playful)') {
            const toast = document.getElementById('app-toast');
            toast.textContent = message;
            toast.style.borderLeftColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        /* =========================================================================
           BLOK 3: MESIN TIMER & LOGIKA GAMIFIKASI TANAMAN
           ========================================================================= */
        //const SESSION_DURATION = 0.2 * 60; // 25 menit dalam detik
         const SESSION_DURATION = 5; // Uncomment untuk testing cepat (5 detik)


        let isBreak = false; // Tambahan untuk menandai mode istirahat 


        //const BREAK_DURATION = 0.1 * 60;
        const BREAK_DURATION = 2;  // untuk testing
    


        let timeLeft      = SESSION_DURATION;
        let timerInterval = null;
        let isRunning     = false;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            if (!checkAuth()) return;
            if (timeLeft <= 0) { 
        timeLeft = isBreak ? BREAK_DURATION : SESSION_DURATION;
        updateTimerDisplay();
    }

            isRunning = true;
            const statusText = isBreak ? "Waktu Istirahat" : "Waktu Fokus";
            const statusEl = document.getElementById('timer-status');
    if (statusEl) statusEl.textContent = statusText;
    
            document.getElementById('btn-start').classList.add('d-none');
            document.getElementById('btn-pause').classList.remove('d-none');
            document.getElementById('timer-display').classList.add('running');
            document.getElementById('timer-display').classList.remove('paused');

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    processSessionComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('btn-pause').classList.add('d-none');
            document.getElementById('btn-start').classList.remove('d-none');
            document.getElementById('btn-start').textContent = '▶ Lanjutkan';
            document.getElementById('timer-display').classList.remove('running');
            document.getElementById('timer-display').classList.add('paused');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isBreak   = false;
            timeLeft  = SESSION_DURATION;
            updateTimerDisplay();
            document.getElementById('btn-pause').classList.add('d-none');
            document.getElementById('btn-start').classList.remove('d-none');
            document.getElementById('btn-start').innerHTML = '▶ Mulai';
            document.getElementById('timer-display').classList.remove('running', 'paused');
            document.getElementById('timer-status').textContent = '';
            // Sync UI dengan data localStorage yang ada
            updatePlantVisual();
            updateSessionCount();
        }

        /* --- Proses Setelah Sesi Selesai --- */
    function processSessionComplete() {
    let activeUser = JSON.parse(localStorage.getItem('activeUser'));
    if (!activeUser) return;

    // --- LOGIKA PERGANTIAN MODE ---
    if (!isBreak) {
        // JIKA SELESAI FOKUS -> Pindah ke Istirahat
        activeUser.completedSessions += 1;

        // Simpan riwayat sesi ke localStorage
        let history = JSON.parse(localStorage.getItem(`history_${activeUser.email}`)) || [];
        history.push({
            date: new Date().toLocaleString('id-ID'),
            duration: 25,
            status: 'Berhasil'
        });

        // Simpan perubahan ke storage
        localStorage.setItem('activeUser', JSON.stringify(activeUser));
        localStorage.setItem(`history_${activeUser.email}`, JSON.stringify(history));

        let users = JSON.parse(localStorage.getItem('pomodoroUsers')) || [];
        let userIndex = users.findIndex(u => u.email === activeUser.email);
        if (userIndex !== -1) {
            users[userIndex].completedSessions = activeUser.completedSessions;
            localStorage.setItem('pomodoroUsers', JSON.stringify(users));
        }

        // Update UI Fokus
        updatePlantVisual();
        updateSessionCount();
        
        // Pindah ke mode Istirahat
        isBreak = true;
        timeLeft = BREAK_DURATION;
        showToast('🎉 Sesi selesai! Sekarang istirahat 5 menit ya ☕', '#10B981');
        document.getElementById('timer-status').textContent = "Waktu Istirahat ☕";
        
    } else {
        // JIKA SELESAI ISTIRAHAT -> Kembali ke Fokus
        isBreak = false;
        timeLeft = SESSION_DURATION;
        showToast('Istirahat selesai! Ayo fokus kembali! 🚀', 'var(--primary-playful)');
        document.getElementById('timer-status').textContent = "Waktu Fokus 🚀";
    }

    // --- RESET UI SETELAH PERGANTIAN MODE ---
    updateTimerDisplay();
    clearInterval(timerInterval);
    isRunning = false;
    document.getElementById('btn-pause').classList.add('d-none');
    document.getElementById('btn-start').classList.remove('d-none');
    document.getElementById('btn-start').textContent = '▶ Mulai';
    
    // Animasi bouncy saat baru saja menyelesaikan sesi fokus (isBreak baru jadi true)
    if (isBreak) {
        const plantDiv = document.getElementById('plant-visual');
        plantDiv.classList.remove('animate-pop');
        plantDiv.classList.add('animate-bouncy');
        setTimeout(() => {
            plantDiv.classList.remove('animate-bouncy');
            plantDiv.classList.add('animate-pop');
        }, 1000);
    }
}

        function updateSessionCount() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (!activeUser) return;
            document.getElementById('session-count').textContent = activeUser.completedSessions;

        window.onload = () => {
            const activeUser = checkAuth();
            if (!activeUser) return;
            updateNavbar();
            document.getElementById('user-greeting').textContent = `Halo, ${activeUser.name}! 👋`;
