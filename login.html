<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Pomodoro & Grow</title>
    <!-- Framework Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- CSS Kustom Bersama -->
    <link href="styles.css" rel="stylesheet">

    <style>
        /* CSS khusus halaman login: posisi & warna dekorasi background */
        .bg-decor-1 {
            width: 280px; height: 280px;
            background: var(--accent-playful);
            opacity: 0.15;
            top: -70px; right: -70px;
        }
        .bg-decor-2 {
            width: 220px; height: 220px;
            background: var(--primary-playful);
            opacity: 0.15;
            bottom: 40px; left: -60px;
        }
    </style>
</head>
<body>

    <!-- Dekorasi Background -->
    <div class="bg-decor bg-decor-1"></div>
    <div class="bg-decor bg-decor-2"></div>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-playful mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">🌱 Pomodoro & Grow</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="index.html">Beranda</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <a class="nav-link fw-bold" href="timer.html">Mulai Fokus</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <a class="nav-link fw-bold" href="koleksi.html">Koleksi Saya</a>
                    </li>
                    <li class="nav-item no-auth">
                        <a href="login.html" class="btn btn-outline-play px-4">Masuk</a>
                    </li>
                    <li class="nav-item no-auth">
                        <a href="register.html" class="btn btn-primary-play">Daftar</a>
                    </li>
                    <li class="nav-item auth-required d-none">
                        <button class="btn btn-outline-danger rounded-pill fw-bold" onclick="logout()">Keluar</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Toast Notifikasi -->
    <div id="toast-container">
        <div id="app-toast" class="playful-toast">Pesan di sini</div>
    </div>

    <!-- ================= KONTEN UTAMA ================= -->
    <main class="container flex-grow-1 d-flex flex-column justify-content-center py-4" style="position: relative; z-index: 1;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="playful-card">
                    <div class="text-center mb-4">
                        <div class="fs-1 mb-2">👋</div>
                        <h2 class="fw-bold">Selamat Datang!</h2>
                        <p class="text-muted fw-semibold">Masuk untuk melanjutkan perjalanan fokusmu.</p>
                    </div>

                    <!-- Form Login (Elemen Form Wajib) -->
                    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                        <div class="mb-3">
                            <label for="logEmail" class="form-label fw-bold">Alamat Email</label>
                            <input type="email" class="form-control form-control-play" id="logEmail" required placeholder="nama@email.com" autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label for="logPassword" class="form-label fw-bold">Kata Sandi</label>
                            <input type="password" class="form-control form-control-play" id="logPassword" required placeholder="Masukkan kata sandi" autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-secondary-play w-100 fs-5">Mulai Menanam 🌱</button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center fw-semibold text-muted mb-0">
                        Belum punya akun?
                        <a href="register.html" class="text-pastel-green text-decoration-none fw-bold">Daftar dulu</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-4 text-center" style="position: relative; z-index: 1;">
        <p class="fw-bold text-muted mb-0">© 2026 Pomodoro & Grow - Final Project PPW.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /* =========================================
           BLOK 1: SISTEM LOGIN
           ========================================= */
        function handleLogin(e) {
            e.preventDefault();
            const email    = document.getElementById('logEmail').value.trim();
            const password = document.getElementById('logPassword').value;

            let users = JSON.parse(localStorage.getItem('pomodoroUsers')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('activeUser', JSON.stringify(user));
                showToast(`Selamat datang kembali, ${user.name}! 🎉`);
                document.getElementById('loginForm').reset();
                updateNavbar();
                setTimeout(() => { window.location.href = 'timer.html'; }, 1500);
            } else {
                showToast('Email atau kata sandi salah!', '#EF4444');
            }
        }

        /* =========================================
           BLOK 2: CEK STATUS LOGIN UNTUK NAVBAR
           ========================================= */
        function updateNavbar() {
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (activeUser) {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.add('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.remove('d-none'));
            } else {
                document.querySelectorAll('.no-auth').forEach(el => el.classList.remove('d-none'));
                document.querySelectorAll('.auth-required').forEach(el => el.classList.add('d-none'));
            }
        }

        function logout() {
            localStorage.removeItem('activeUser');
            showToast('Berhasil keluar.');
            updateNavbar();
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        }

        function showToast(message, color = 'var(--primary-playful)') {
            const toast = document.getElementById('app-toast');
            toast.textContent = message;
            toast.style.borderLeftColor = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.onload = () => {
            updateNavbar();
            const activeUser = JSON.parse(localStorage.getItem('activeUser'));
            if (activeUser) { window.location.href = 'timer.html'; }
        };
    </script>
</body>
</html>
